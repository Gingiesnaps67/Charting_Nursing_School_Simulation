<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Chartwell Sim — Nursing Trainer</title>
<meta name="description" content="Practice clinical charting and safe medication administration with fictional patients." />

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#0E1822" />

<!-- iOS home-screen support (Safari does not read the manifest for this) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Chartwell Sim" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
<link rel="icon" href="./icons/icon-192.png" />

<style>
  html, body { margin: 0; padding: 0; background: #0E1822; }
  #root { min-height: 100vh; }
  /* Simple boot spinner shown until React mounts */
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0E1822; color: #8FA6B8; font-family: system-ui, sans-serif; font-size: 13px; }
  #boot .dot { width: 8px; height: 8px; border-radius: 50%; background: #2DD4BF; margin-right: 8px;
    animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }

  #install-btn { display: none; position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    z-index: 999; align-items: center; gap: 8px; background: #0F766E; color: #E6EEF5; border: none;
    border-radius: 999px; padding: 12px 20px; font-family: system-ui, sans-serif; font-weight: 700;
    font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
</style>
</head>
<body>

<div id="boot"><span class="dot"></span>Loading Chartwell Sim…</div>
<div id="root"></div>

<button id="install-btn" onclick="window.__installApp && window.__installApp()">
  ⬇ Install Chartwell Sim
</button>

<!-- React 18 (standalone UMD builds, no bundler needed) — versions pinned & verified -->
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<!-- Babel standalone: compiles app.jsx to plain JS right in the browser -->
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.9/babel.min.js"></script>
<!-- lucide icon set, UMD build -->
<script src="https://cdn.jsdelivr.net/npm/lucide@0.383.0/dist/umd/lucide.min.js"></script>

<script>
  // Remove the boot spinner once React has actually painted something.
  const bootObserver = new MutationObserver(() => {
    const root = document.getElementById("root");
    if (root && root.children.length > 0) {
      const boot = document.getElementById("boot");
      if (boot) boot.remove();
      bootObserver.disconnect();
    }
  });
  bootObserver.observe(document.getElementById("root"), { childList: true });
</script>

<script type="text/babel" src="./app.jsx" data-presets="react"></script>
</body>
</html>
